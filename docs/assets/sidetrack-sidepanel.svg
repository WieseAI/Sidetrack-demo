<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 360" width="480" height="360">
  <!-- Sidepanel frame -->
  <rect x="0" y="0" width="480" height="360" fill="#f7f7f8"/>
  <rect x="0" y="0" width="480" height="56" fill="#ffffff"/>
  <line x1="0" y1="56" x2="480" y2="56" stroke="#e4e4e7" stroke-width="1"/>

  <!-- Header: title + tabs + actions -->
  <text x="16" y="34" font-family="-apple-system, sans-serif" font-size="16" font-weight="600" fill="#18181b">Main ▾</text>
  <rect x="120" y="20" width="100" height="24" rx="6" fill="#fafafa" stroke="#e4e4e7"/>
  <rect x="124" y="24" width="42" height="16" rx="4" fill="#ffffff" stroke="#d4d4d8"/>
  <text x="135" y="36" font-family="-apple-system, sans-serif" font-size="12" font-weight="600" fill="#18181b">Board</text>
  <text x="180" y="36" font-family="-apple-system, sans-serif" font-size="12" fill="#71717a">Reports</text>
  <text x="380" y="34" font-family="-apple-system, sans-serif" font-size="12" fill="#71717a">Import</text>
  <text x="420" y="34" font-family="-apple-system, sans-serif" font-size="12" fill="#71717a">Export</text>
  <text x="460" y="34" font-family="-apple-system, sans-serif" font-size="12" fill="#71717a">⚙</text>

  <!-- Running timer bar -->
  <rect x="0" y="56" width="480" height="40" fill="#eef2ff"/>
  <line x1="0" y1="96" x2="480" y2="96" stroke="#e4e4e7" stroke-width="1"/>
  <circle cx="20" cy="76" r="4" fill="#6366f1"/>
  <text x="36" y="72" font-family="-apple-system, sans-serif" font-size="11" fill="#71717a">Main › In Progress</text>
  <text x="36" y="88" font-family="-apple-system, sans-serif" font-size="13" font-weight="600" fill="#18181b">Refactor the timer reducer</text>
  <text x="420" y="80" font-family="ui-monospace, monospace" font-size="14" font-weight="600" fill="#6366f1">01:23:45</text>
  <text x="450" y="82" font-family="-apple-system, sans-serif" font-size="11" fill="#71717a">Stop</text>

  <!-- Columns -->
  <g transform="translate(16, 108)">
    <!-- Column 1: Inbox -->
    <rect x="0" y="0" width="140" height="220" rx="8" fill="#fafafa" stroke="#e4e4e7"/>
    <text x="12" y="22" font-family="-apple-system, sans-serif" font-size="13" font-weight="600" fill="#18181b">Inbox</text>
    <rect x="60" y="10" width="20" height="14" rx="7" fill="#eef2ff"/>
    <text x="66" y="20" font-family="-apple-system, sans-serif" font-size="9" font-weight="600" fill="#6366f1">0</text>

    <!-- Column 2: Backlog -->
    <g transform="translate(150, 0)">
      <rect x="0" y="0" width="140" height="220" rx="8" fill="#fafafa" stroke="#e4e4e7"/>
      <text x="12" y="22" font-family="-apple-system, sans-serif" font-size="13" font-weight="600" fill="#18181b">Backlog</text>
      <rect x="68" y="10" width="20" height="14" rx="7" fill="#fafafa" stroke="#e4e4e7"/>
      <text x="74" y="20" font-family="-apple-system, sans-serif" font-size="9" font-weight="600" fill="#71717a">3</text>
      <!-- Card 1 -->
      <rect x="8" y="32" width="124" height="40" rx="6" fill="#ffffff" stroke="#e4e4e7"/>
      <text x="16" y="48" font-family="-apple-system, sans-serif" font-size="11" font-weight="600" fill="#18181b">Welcome to Sidetrack</text>
      <text x="16" y="62" font-family="-apple-system, sans-serif" font-size="9" fill="#71717a">Drag me to another column</text>
      <!-- Card 2 -->
      <rect x="8" y="80" width="124" height="32" rx="6" fill="#ffffff" stroke="#e4e4e7"/>
      <text x="16" y="94" font-family="-apple-system, sans-serif" font-size="11" font-weight="600" fill="#18181b">Set up workspace</text>
      <text x="16" y="106" font-family="-apple-system, sans-serif" font-size="9" fill="#71717a">▶ 0m</text>
    </g>

    <!-- Column 3: In Progress -->
    <g transform="translate(300, 0)">
      <rect x="0" y="0" width="140" height="220" rx="8" fill="#fafafa" stroke="#e4e4e7"/>
      <text x="12" y="22" font-family="-apple-system, sans-serif" font-size="13" font-weight="600" fill="#18181b">In Progress</text>
      <rect x="92" y="10" width="20" height="14" rx="7" fill="#fafafa" stroke="#e4e4e7"/>
      <text x="98" y="20" font-family="-apple-system, sans-serif" font-size="9" font-weight="600" fill="#71717a">1</text>
      <!-- Active card (running) -->
      <rect x="8" y="32" width="124" height="40" rx="6" fill="#ffffff" stroke="#6366f1" stroke-width="1.5"/>
      <text x="16" y="48" font-family="-apple-system, sans-serif" font-size="11" font-weight="600" fill="#18181b">Refactor the timer</text>
      <circle cx="20" cy="62" r="3" fill="#6366f1"/>
      <text x="28" y="66" font-family="-apple-system, sans-serif" font-size="9" font-weight="600" fill="#6366f1">● 1h 23m</text>
    </g>
  </g>

  <!-- Footer -->
  <line x1="0" y1="328" x2="480" y2="328" stroke="#e4e4e7" stroke-width="1"/>
  <text x="16" y="346" font-family="ui-monospace, monospace" font-size="10" fill="#71717a">Alt + Shift + A</text>
  <text x="120" y="346" font-family="-apple-system, sans-serif" font-size="11" fill="#71717a">quick-add</text>
</svg>
